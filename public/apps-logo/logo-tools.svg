<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="EffortGo Tools mark">
  <defs>
    <g id="gear-outer">
      <circle r="31"/>
      <rect x="-9" y="-52" width="18" height="27" rx="5"/>
      <rect x="-9" y="-52" width="18" height="27" rx="5" transform="rotate(45)"/>
      <rect x="-9" y="-52" width="18" height="27" rx="5" transform="rotate(90)"/>
      <rect x="-9" y="-52" width="18" height="27" rx="5" transform="rotate(135)"/>
      <rect x="-9" y="-52" width="18" height="27" rx="5" transform="rotate(180)"/>
      <rect x="-9" y="-52" width="18" height="27" rx="5" transform="rotate(225)"/>
      <rect x="-9" y="-52" width="18" height="27" rx="5" transform="rotate(270)"/>
